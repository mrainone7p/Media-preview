# Reattach query string when proxy_pass uses a variable (it doesn't auto-append it).
map $query_string $qs {
    ""      "";
    default "?$query_string";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static app ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── iCal CORS proxy ─────────────────────────────────────────────────────
    # Usage: GET /proxy/http/192.168.1.x:PORT/sonarr/feed/v3/calendar/...
    #        GET /proxy/https/host/path?query=value
    # The "://" separator is replaced with "/" so nginx never receives a
    # percent-encoded URL in proxy_pass (avoids "invalid URL prefix" errors).
    location ~ "^/proxy/(https?)/(.+)$" {
        # Docker's internal DNS resolver (resolves container & LAN hostnames)
        resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }

        set $backend $1://$2$qs;

        proxy_pass              $backend;
        proxy_ssl_server_name   on;
        proxy_set_header        Host              $proxy_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Expose to the browser
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

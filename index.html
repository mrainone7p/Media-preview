<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>*arr Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c10;--surface:#13141a;--surface2:#1c1d26;--surface3:#23242f;--border:#2a2b38;--text:#e8e9f0;--muted:#7a7b8e;--accent:#7c6fff}
:root.light{--bg:#f4f6fb;--surface:#ffffff;--surface2:#f2f4fb;--surface3:#e8ecf7;--border:#d9deec;--text:#101423;--muted:#5f6880;--accent:#6558f5}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;transition:background .15s,color .15s}
#app{display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--surface);gap:12px;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:9px;min-width:0;flex:1}
.logo-img{height:40px;width:40px;object-fit:contain;border-radius:6px;flex-shrink:0}
.logo-text{display:flex;align-items:baseline;gap:8px;min-width:0}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:23px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-name em{color:var(--accent);font-style:normal}
.logo-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav{display:flex;gap:3px;flex-shrink:0}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--muted);padding:5px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;transition:all .15s}
.nav-btn.active{background:var(--surface2);border-color:var(--border);color:var(--text)}
.nav-btn:hover:not(.active){color:var(--text)}
.sync-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;transition:all .15s;flex-shrink:0}
.sync-btn:hover{border-color:var(--accent);color:var(--accent)}
/* Calendar */
.cal-page{padding:18px 22px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--text)}
.month-nav{display:flex;gap:5px}
.mnav{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:29px;height:29px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mnav:hover{border-color:var(--accent);color:var(--accent)}
.today-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0 10px;height:29px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;transition:all .15s}
.today-btn:hover{border-color:var(--accent);color:var(--accent)}
.sbar{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px}
.sdot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sdot.spin{background:#f59e0b;animation:pulse 1s infinite}
.sdot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dheads{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.dh{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);padding:4px 0;letter-spacing:.5px}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dcell{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px;min-height:90px;transition:border-color .15s}
.dcell.otm{opacity:.28}
.dcell.tod{border-color:var(--accent);background:#131220}
.dnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:3px}
.dcell.tod .dnum{color:var(--accent);font-weight:500}
.epill{font-size:9.5px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.4;transition:opacity .1s}
.epill:hover{opacity:.75}
.more-ev{font-size:9px;color:var(--muted);margin-top:1px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.litem{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* Content modal page */
.content-page{padding:18px 22px;max-width:820px}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 13px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:18px;display:inline-flex;align-items:center;gap:5px}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.ccard{display:flex;gap:26px;align-items:flex-start}
.poster-wrap{flex-shrink:0;width:170px}
.poster{width:170px;border-radius:9px;display:block;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.poster-ph{width:170px;height:255px;background:var(--surface2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:52px;color:var(--muted);border:1px solid var(--border)}
.cright{flex:1;min-width:0}
.feed-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace;margin-bottom:9px}
.ctitle{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:25px;color:var(--text);line-height:1.15;margin-bottom:5px}
.ep-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:9px}
.cmeta{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;margin-bottom:13px;align-items:center}
.star{color:#ffd166}
.overview{color:var(--text);line-height:1.7;font-size:13px;margin-bottom:16px;opacity:.82}
.trailer-btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;padding:8px 17px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:500;transition:background .15s}
.trailer-btn:hover{background:#6c5fef}
.nokey-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;line-height:1.6;color:var(--muted)}
.nokey-box strong{color:var(--text);display:block;margin-bottom:5px}
.nokey-box a{color:var(--accent);text-decoration:none}
.nokey-box a:hover{text-decoration:underline}
.loading-txt{color:var(--muted);font-size:12px;padding:16px 0;font-family:'DM Mono',monospace}
.avail-date{margin-top:14px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
/* Settings */
.settings-page{padding:18px 22px;max-width:680px}
.settings-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;color:var(--text);margin-bottom:18px}
.slabel{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;margin-top:20px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:4px}
.irow{display:flex;gap:8px;align-items:center}
.irow+.irow{margin-top:9px}
.irow-name{align-items:flex-start}
.name-wrap{display:flex;gap:8px;flex:1}
.name-col{display:flex;flex-direction:column;gap:5px;flex:1}
.mini-label{font-size:10px;color:var(--muted)}
.flabel{font-size:11px;color:var(--muted);width:78px;flex-shrink:0}
.tinput{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 9px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .15s}
.tinput:focus{border-color:var(--accent)}
.tinput::placeholder{color:var(--muted)}
.monoinput{font-family:'DM Mono',monospace;font-size:10px}
.logo-prev{width:30px;height:30px;object-fit:contain;border-radius:4px;border:1px solid var(--border);flex-shrink:0}
.upbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s}
.upbtn:hover{border-color:var(--accent);color:var(--accent)}
.upbtn.danger:hover{border-color:#ef4444;color:#ef4444}
.feed-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:7px}
.feed-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.feed-name-row{display:flex;align-items:center;gap:7px}
.fcdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.fninput{background:transparent;border:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;outline:none;width:150px}
.fstat{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:4px}
.furow{display:flex;gap:6px;margin-bottom:7px}
.fuinput{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:9.5px;outline:none;transition:border-color .15s}
.fuinput:focus{border-color:var(--accent)}
.fuinput::placeholder{color:var(--muted)}
.delbtn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:5px 8px;cursor:pointer;font-size:10px;transition:all .15s;flex-shrink:0}
.delbtn:hover{border-color:#ef4444;color:#ef4444}
.swatches{display:flex;gap:5px;flex-wrap:wrap}
.swatch{width:15px;height:15px;border-radius:50%;cursor:pointer;transition:transform .1s;border:2px solid transparent}
.swatch:hover{transform:scale(1.25)}
.swatch.sel{border-color:#fff}
.add-feed{background:var(--surface2);border:1px dashed var(--border);color:var(--muted);border-radius:9px;padding:10px;width:100%;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:3px}
.add-feed:hover{border-color:var(--accent);color:var(--accent)}
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:14px;font-size:11px;color:var(--muted);line-height:1.6}
.info-box strong{color:var(--text);display:block;margin-bottom:4px}
.info-box code{background:var(--surface3);padding:1px 4px;border-radius:3px;font-family:'DM Mono',monospace;color:#fbbf24;font-size:10px}
.save-row{background:#0c1c0c;border:1px solid #193019;border-radius:8px;padding:10px 14px;margin-top:12px;display:flex;align-items:center;justify-content:space-between}
.save-row span{font-size:11px;color:#4ade80}
.save-btn{background:var(--accent);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .15s}
.save-btn:hover{background:#6c5fef}
</style>

<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
'use strict';
const {useState, useEffect, useRef, useCallback} = React;

// ── Constants ────────────────────────────────────────────────────────────────
const PALETTE = ['#7c6fff','#00b4d8','#ffd166','#06d6a0','#ff6b6b','#c77dff','#f4a261','#2ec4b6','#e76f51','#a8dadc'];
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const INTERVALS = [
  {l:'15 minutes', v:15},
  {l:'1 hour',     v:60},
  {l:'6 hours',    v:360},
  {l:'12 hours',   v:720},
  {l:'24 hours',   v:1440},
];
const DEFAULT_FEEDS = [
  {id:'f1', name:'Sonarr', url:'', color:'#00b4d8', events:[], status:'demo'},
  {id:'f2', name:'Radarr', url:'', color:'#ffd166', events:[], status:'demo'},
  {id:'f3', name:'Lidarr', url:'', color:'#06d6a0', events:[], status:'demo'},
];

// ── Proxy fetch ──────────────────────────────────────────────────────────────
// iCal requests go through /proxy/<scheme>/<host:port>/<path> to avoid CORS.
// Using a path-based URL (not ?url=encoded) so nginx never sees a percent-
// encoded URL in proxy_pass, which would trigger "invalid URL prefix" errors.
function proxyFetch(url) {
  if (window.location.protocol === 'file:') {
    return fetch(url); // local dev: try direct
  }
  // http://host:port/path?q=v  ->  /proxy/http/host:port/path?q=v
  return fetch('/proxy/' + url.replace(/^(https?):\/\//, '$1/'));
}

// ── iCal parser ──────────────────────────────────────────────────────────────
function parseICS(text, feedName, feedColor) {
  const evs = [];
  const lines = text.replace(/\r\n|\r/g, '\n').replace(/\n[ \t]/g, '').split('\n');
  let cur = null;
  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { cur = {}; }
    else if (line === 'END:VEVENT' && cur) {
      if (cur.start) evs.push({...cur, id: Math.random().toString(36).slice(2), feedName, feedColor});
      cur = null;
    } else if (cur) {
      const ci = line.indexOf(':');
      if (ci === -1) continue;
      const key = line.substring(0, ci).split(';')[0].toUpperCase();
      const val = line.substring(ci + 1);
      if      (key === 'DTSTART')     cur.start       = parseDT(val);
      else if (key === 'DTEND')       cur.end         = parseDT(val);
      else if (key === 'SUMMARY')     cur.title       = val.replace(/\\,/g, ',').replace(/\\n/g, ' ').trim();
      else if (key === 'DESCRIPTION') cur.description = val.replace(/\\n/g, '\n').replace(/\\,/g, ',').trim();
    }
  }
  return evs;
}
function parseDT(s) {
  s = s.replace('Z', '');
  const [d, t] = s.includes('T') ? s.split('T') : [s, '000000'];
  return new Date(+d.slice(0,4), +d.slice(4,6)-1, +d.slice(6,8), +t.slice(0,2), +t.slice(2,4));
}

// ── Calendar helpers ─────────────────────────────────────────────────────────
function getCells(year, month) {
  const first = new Date(year, month, 1);
  const last  = new Date(year, month + 1, 0);
  const cells = [];
  for (let i = 0; i < first.getDay(); i++)
    cells.push({date: new Date(year, month, 1 - first.getDay() + i), cur: false});
  for (let d = 1; d <= last.getDate(); d++)
    cells.push({date: new Date(year, month, d), cur: true});
  const rem = 7 - (cells.length % 7);
  if (rem < 7) for (let i = 1; i <= rem; i++)
    cells.push({date: new Date(year, month + 1, i), cur: false});
  return cells;
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth()    === b.getMonth()
      && a.getDate()     === b.getDate();
}

// ── Sample events (demo / no URL configured) ─────────────────────────────────
function makeSampleEvents() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  const src = [
    {name:'Sonarr', color:'#00b4d8', titles:['The Last of Us S02E04','Severance S02E07','House of the Dragon S03E01','Andor S02E04','The Bear S04E01','Fallout S02E02','Silo S02E05','The Penguin S01E06','True Detective S05E02','Shogun E09','Reacher S03E05']},
    {name:'Radarr', color:'#ffd166', titles:['Dune: Part Three','Mission: Impossible 8','Gladiator 2','Alien: Romulus','A Quiet Place 3','Tron: Ares','28 Months Later','Blade','Deadpool 3']},
    {name:'Lidarr', color:'#06d6a0', titles:['Taylor Swift - Tortured Poets Vol 2','Billie Eilish - Hit Me Hard','Radiohead - Remaster Box','Kendrick Lamar - GNX Deluxe','The Weeknd - Hurry Up Tomorrow']},
  ];
  const evs = [];
  for (const s of src) {
    for (const title of s.titles) {
      const day = Math.floor(Math.random() * 35) - 7;
      const hr  = Math.floor(Math.random() * 8) + 14;
      evs.push({
        id: Math.random().toString(36).slice(2), title,
        start:    new Date(y, m, day + 1, hr, 0),
        end:      new Date(y, m, day + 1, hr + 2, 0),
        feedName: s.name, feedColor: s.color,
      });
    }
  }
  return evs;
}

// ── ContentModal ─────────────────────────────────────────────────────────────
function ContentModal({ev, tmdbKey, onClose}) {
  const [info,   setInfo]   = useState(null);
  const [tKey,   setTKey]   = useState(null);
  const [status, setStatus] = useState('loading');
  const el = React.createElement;

  const isMovie = /radarr/i.test(ev.feedName);
  const isMusic = /lidarr/i.test(ev.feedName);

  const cleanTitle = ev.title
    .replace(/\s+S\d{1,2}E\d{1,2}.*/i, '')
    .replace(/\s*\((theatrical|digital|physical|streaming)\s+release\)/gi, '')
    .replace(/\b(theatrical|digital|physical|streaming)\s+release\b/gi, '')
    .replace(/\s*\(4K\)/gi, '')
    .replace(/\s*\[.*?\]/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();

  useEffect(() => {
    if (isMusic)  { setStatus('music');  return; }
    if (!tmdbKey) { setStatus('nokey');  return; }
    const type = isMovie ? 'movie' : 'tv';
    (async () => {
      try {
        const r  = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${tmdbKey}&query=${encodeURIComponent(cleanTitle)}&language=en-US`);
        const d  = await r.json();
        if (d.results?.[0]) {
          const item = {...d.results[0], _type: type};
          setInfo(item);
          const vr = await fetch(`https://api.themoviedb.org/3/${type}/${item.id}/videos?api_key=${tmdbKey}`);
          const vd = await vr.json();
          const yt = vd.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
          if (yt) setTKey(yt.key);
          setStatus('found');
        } else {
          setStatus('notfound');
        }
      } catch(e) { setStatus('error'); }
    })();
  }, []);

  const title    = info ? (info.title || info.name) : cleanTitle;
  const year     = info ? new Date(info.release_date || info.first_air_date || '').getFullYear() || '' : '';
  const rating   = info?.vote_average ? info.vote_average.toFixed(1) : null;
  const poster   = info?.poster_path  ? `https://image.tmdb.org/t/p/w500${info.poster_path}` : null;
  const isEp     = ev.title.length > cleanTitle.length;
  const fmtDate  = d => d && d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});

  return el('div', {className:'content-page'},
    el('button', {className:'back-btn', onClick:onClose}, '← Back to Calendar'),
    el('div', {className:'ccard'},
      el('div', {className:'poster-wrap'},
        poster
          ? el('img',  {className:'poster',    src:poster, alt:title})
          : el('div',  {className:'poster-ph', style:{borderLeft:`4px solid ${ev.feedColor}`}}, cleanTitle[0]?.toUpperCase())
      ),
      el('div', {className:'cright'},
        el('div',  {className:'feed-badge', style:{background:ev.feedColor+'22', color:ev.feedColor, border:`1px solid ${ev.feedColor}44`}}, ev.feedName),
        el('h1',   {className:'ctitle'},    status === 'loading' ? cleanTitle : title),
        isEp && el('p', {className:'ep-label'}, ev.title),
        el('div', {className:'cmeta'},
          year   && el('span', null, year),
          rating && el('span', null, el('span', {className:'star'}, '★'), ' ', rating),
          isMusic && el('span', null, '♪ Music release'),
        ),
        status === 'loading'  && el('p',   {className:'loading-txt'}, 'Fetching from TMDB…'),
        status === 'nokey'    && el('div', {className:'nokey-box'},
          el('strong', null, 'TMDB API key not configured'),
          'Add your free key in Settings → Integrations to unlock posters, trailers, ratings and overviews. ',
          el('a', {href:'https://www.themoviedb.org/settings/api', target:'_blank', rel:'noopener'}, 'Get a free key →'),
        ),
        status === 'notfound' && el('p', {className:'overview', style:{color:'var(--muted)'}}, `No TMDB match for "${cleanTitle}". It may not be released yet or the title differs slightly.`),
        status === 'error'    && el('p', {className:'overview', style:{color:'#ef4444'}},       'Could not reach TMDB. Check your API key or internet connection.'),
        status === 'music'    && el('p', {className:'overview'}, 'Music release tracked by Lidarr.'),
        status === 'found' && info?.overview && el('p', {className:'overview'}, info.overview),
        tKey && el('a', {href:`https://www.youtube.com/watch?v=${tKey}`, className:'trailer-btn', target:'_blank', rel:'noopener'}, '▶ Watch Trailer'),
        ev.start && el('p', {className:'avail-date'}, 'Available: ' + fmtDate(ev.start)),
      ),
    ),
  );
}

// ── CalendarPage ──────────────────────────────────────────────────────────────
function CalendarPage({feeds, allEvents, onRefresh, loading, onEventClick}) {
  const now = new Date();
  const [year,  setYear]  = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const cells = getCells(year, month);
  const el = React.createElement;

  const evOnDay = d => allEvents.filter(e => e.start && sameDay(e.start, d)).sort((a,b) => a.start - b.start);
  const feedColors = {};
  allEvents.forEach(e => { feedColors[e.feedName] = e.feedColor; });
  const feedNames = [...new Set(allEvents.map(e => e.feedName))];

  const prev = () => { if (month === 0) { setYear(y => y-1); setMonth(11); } else setMonth(m => m-1); };
  const next = () => { if (month ===11) { setYear(y => y+1); setMonth(0);  } else setMonth(m => m+1); };

  return el('div', {className:'cal-page'},
    el('div', {className:'cal-header'},
      el('span', {className:'month-label'}, `${MONTHS[month]} ${year}`),
      el('div',  {className:'month-nav'},
        el('button', {className:'today-btn', onClick:() => { setYear(now.getFullYear()); setMonth(now.getMonth()); }}, 'Today'),
        el('button', {className:'mnav', onClick:prev}, '‹'),
        el('button', {className:'mnav', onClick:next}, '›'),
      ),
    ),
    el('div', {className:'sbar'},
      el('div',  {className:`sdot${loading ? ' spin' : ''}`}),
      el('span', null, loading ? 'Syncing feeds…' : `${allEvents.length} events · ${feeds.length} feeds`),
      !loading && el('span', {style:{marginLeft:'auto', cursor:'pointer', textDecoration:'underline'}, onClick:onRefresh}, '↻ refresh'),
    ),
    el('div', {className:'dheads'}, DAYS.map(d => el('div', {key:d, className:'dh'}, d))),
    el('div', {className:'cgrid'},
      cells.map((cell, i) => {
        const evs = evOnDay(cell.date), isToday = sameDay(cell.date, now), max = 3;
        return el('div', {key:i, className:`dcell${!cell.cur ? ' otm' : ''}${isToday ? ' tod' : ''}`},
          el('div', {className:'dnum'}, cell.date.getDate()),
          ...evs.slice(0, max).map(ev => el('div', {
            key: ev.id, className:'epill',
            style:{background:ev.feedColor+'22', color:ev.feedColor, border:`1px solid ${ev.feedColor}33`},
            onClick: e => { e.stopPropagation(); onEventClick(ev); },
          }, ev.title)),
          evs.length > max && el('div', {className:'more-ev'}, `+${evs.length - max} more`),
        );
      }),
    ),
    feedNames.length > 0 && el('div', {className:'legend'},
      feedNames.map(name => el('div', {key:name, className:'litem'},
        el('div', {className:'ldot', style:{background:feedColors[name]}}),
        el('span', null, name),
      )),
    ),
  );
}

// ── SettingsPage ──────────────────────────────────────────────────────────────
function SettingsPage({feeds, setFeeds, serverName, setServerName, serverSubtext, setServerSubtext, serverLogo, setServerLogo, refreshInterval, setRefreshInterval, tmdbKey, setTmdbKey, themeMode, setThemeMode, onSave}) {
  const [dirty, setDirty] = useState(false);
  const fileRef = useRef(null);
  const el = React.createElement;

  const updFeed = (id, field, val) => { setFeeds(f => f.map(x => x.id === id ? {...x, [field]:val} : x)); setDirty(true); };
  const addFeed = () => { setFeeds(f => [...f, {id:Math.random().toString(36).slice(2), name:'New Feed', url:'', color:PALETTE[f.length % PALETTE.length], events:[], status:'idle'}]); setDirty(true); };
  const delFeed = id  => { setFeeds(f => f.filter(x => x.id !== id)); setDirty(true); };

  const handleLogo = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setServerLogo(ev.target.result); setDirty(true); };
    reader.readAsDataURL(file);
  };

  const statusDot = s => el('div', {style:{width:5, height:5, borderRadius:'50%', flexShrink:0,
    background: s==='ok' ? '#22c55e' : s==='error' ? '#ef4444' : s==='loading' ? '#f59e0b' : '#3a3b48'}});

  return el('div', {className:'settings-page'},
    el('div', {className:'settings-title'}, 'Settings'),

    // Server identity
    el('div', {className:'slabel'}, 'Server Identity'),
    el('div', {className:'scard'},
      el('div', {className:'irow irow-name'},
        el('span', {className:'flabel'}, 'Name'),
        el('div', {className:'name-wrap'},
          el('div', {className:'name-col'},
            el('span', {className:'mini-label'}, 'Main title'),
            el('input', {className:'tinput', value:serverName, placeholder:'*arr Calendar', onChange:e => { setServerName(e.target.value); setDirty(true); }}),
          ),
          el('div', {className:'name-col'},
            el('span', {className:'mini-label'}, 'Subtext'),
            el('input', {className:'tinput', value:serverSubtext, placeholder:'Now showing', onChange:e => { setServerSubtext(e.target.value); setDirty(true); }}),
          ),
        ),
      ),
      el('div', {className:'irow'},
        el('span', {className:'flabel'}, 'Logo'),
        serverLogo && el('img', {className:'logo-prev', src:serverLogo}),
        el('button', {className:'upbtn', onClick:() => fileRef.current.click()}, serverLogo ? 'Change' : 'Upload image'),
        serverLogo && el('button', {className:'upbtn danger', onClick:() => { setServerLogo(null); setDirty(true); }}, 'Remove'),
        el('input', {type:'file', accept:'image/*', ref:fileRef, style:{display:'none'}, onChange:handleLogo}),
      ),
    ),

    // Auto sync
    el('div', {className:'slabel'}, 'Auto Sync'),
    el('div', {className:'scard'},
      el('div', {className:'irow'},
        el('span', {className:'flabel'}, 'Interval'),
        el('select', {className:'tinput', style:{cursor:'pointer'}, value:refreshInterval, onChange:e => { setRefreshInterval(+e.target.value); setDirty(true); }},
          INTERVALS.map(({l, v}) => el('option', {key:v, value:v}, l)),
        ),
      ),
      el('div', {className:'irow'},
        el('span', {className:'flabel'}, 'Theme'),
        el('select', {className:'tinput', style:{cursor:'pointer'}, value:themeMode, onChange:e => { setThemeMode(e.target.value); setDirty(true); }},
          el('option', {value:'system'}, 'System'),
          el('option', {value:'dark'}, 'Dark'),
          el('option', {value:'light'}, 'Light'),
        ),
      ),
    ),

    // Integrations / TMDB
    el('div', {className:'slabel'}, 'Integrations'),
    el('div', {className:'scard'},
      el('div', {className:'irow'},
        el('span', {className:'flabel'}, 'TMDB Key'),
        el('input', {
          className:'tinput monoinput', value:tmdbKey, type:'password',
          placeholder:'Paste key → themoviedb.org/settings/api (free)',
          onChange:e => { setTmdbKey(e.target.value); setDirty(true); },
        }),
      ),
    ),

    // iCal feeds
    el('div', {className:'slabel'}, 'iCal Feeds'),
    ...feeds.map(feed => el('div', {key:feed.id, className:'feed-card'},
      el('div', {className:'feed-top'},
        el('div', {className:'feed-name-row'},
          el('div', {className:'fcdot', style:{background:feed.color}}),
          el('input', {className:'fninput', value:feed.name, onChange:e => updFeed(feed.id, 'name', e.target.value)}),
        ),
        el('div', {className:'fstat'},
          statusDot(feed.status),
          feed.status === 'ok'    ? `${feed.events?.length || 0} events`
        : feed.status === 'error' ? 'error'
        : feed.status === 'demo'  ? 'demo'
        : 'idle',
        ),
      ),
      el('div', {className:'furow'},
        el('input', {className:'fuinput', value:feed.url, placeholder:'http://host:port/sonarr/feed/v3/calendar/Sonarr.ics?apikey=...', onChange:e => updFeed(feed.id, 'url', e.target.value)}),
        el('button', {className:'delbtn', onClick:() => delFeed(feed.id)}, '✕'),
      ),
      el('div', {className:'swatches'},
        PALETTE.map(c => el('div', {key:c, className:`swatch${feed.color === c ? ' sel' : ''}`, style:{background:c}, onClick:() => updFeed(feed.id, 'color', c)})),
      ),
    )),
    el('button', {className:'add-feed', onClick:addFeed}, '+ Add Feed'),

    el('div', {className:'info-box'},
      el('strong', null, 'How feed fetching works in Docker'),
      'Feed URLs are fetched via the built-in ', el('code', null, '/proxy'), ' endpoint to avoid CORS blocks. Just paste your ', el('code', null, '.ics'), ' URL as-is — no changes needed.',
    ),

    dirty && el('div', {className:'save-row'},
      el('span', null, 'Unsaved changes'),
      el('button', {className:'save-btn', onClick:() => { onSave(); setDirty(false); }}, 'Save & Sync'),
    ),
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page,            setPage]            = useState('calendar');
  const [modal,           setModal]           = useState(null);
  const [feeds,           setFeeds]           = useState(DEFAULT_FEEDS);
  const [allEvents,       setAllEvents]       = useState([]);
  const [loading,         setLoading]         = useState(false);
  const [serverName,      setServerName]      = useState('');
  const [serverSubtext,   setServerSubtext]   = useState('');
  const [serverLogo,      setServerLogo]      = useState(null);
  const [refreshInterval, setRefreshInterval] = useState(1440);
  const [tmdbKey,         setTmdbKey]         = useState('');
  const [themeMode,       setThemeMode]       = useState('system');
  const feedsRef = useRef(feeds); feedsRef.current = feeds;
  const el = React.createElement;

  const fetchFeeds = useCallback(async cf => {
    setLoading(true);
    const sample   = makeSampleEvents();
    let updated    = [...cf];
    const newEvs   = [];
    const demoNames = cf.filter(f => !f.url).map(f => f.name);
    sample.forEach(e => { if (demoNames.includes(e.feedName)) newEvs.push(e); });

    for (const feed of cf) {
      if (!feed.url) continue;
      try {
        const r = await proxyFetch(feed.url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const evs = parseICS(await r.text(), feed.name, feed.color);
        newEvs.push(...evs);
        updated = updated.map(f => f.id === feed.id ? {...f, events:evs, status:'ok'} : f);
      } catch(e) {
        updated = updated.map(f => f.id === feed.id ? {...f, events:[], status:'error'} : f);
      }
    }
    setFeeds(updated);
    setAllEvents(newEvs.length > 0 ? newEvs : sample);
    setLoading(false);
  }, []);

  // Load persisted state
  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem('arr-cal-v2');
        if (raw) {
          const s = JSON.parse(raw);
          const savedFeeds = s.feeds ? s.feeds.map(f => ({...f, events:[], status:'idle'})) : DEFAULT_FEEDS;
          if (s.feeds)           setFeeds(savedFeeds);
          if (s.serverName  !== undefined) setServerName(s.serverName);
          if (s.serverSubtext !== undefined) setServerSubtext(s.serverSubtext);
          if (s.serverLogo  !== undefined) setServerLogo(s.serverLogo);
          if (s.refreshInterval)           setRefreshInterval(s.refreshInterval);
          if (s.tmdbKey     !== undefined) setTmdbKey(s.tmdbKey);
          if (s.themeMode   !== undefined) setThemeMode(s.themeMode);
          await fetchFeeds(savedFeeds);
        } else {
          await fetchFeeds(DEFAULT_FEEDS);
        }
      } catch(e) { await fetchFeeds(DEFAULT_FEEDS); }
    })();
  }, []);

  // Auto-refresh timer
  useEffect(() => {
    if (!refreshInterval) return;
    const id = setInterval(() => fetchFeeds(feedsRef.current), refreshInterval * 60 * 1000);
    return () => clearInterval(id);
  }, [refreshInterval]);

  useEffect(() => {
    const root = document.documentElement;
    const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const resolved = themeMode === 'system' ? (systemDark ? 'dark' : 'light') : themeMode;
    root.classList.toggle('light', resolved === 'light');
  }, [themeMode]);

  const saveAndSync = () => {
    try {
      localStorage.setItem('arr-cal-v2', JSON.stringify({
        feeds: feeds.map(f => ({...f, events:[], status:'idle'})),
        serverName, serverSubtext, serverLogo, refreshInterval, tmdbKey, themeMode,
      }));
    } catch(e) {}
    fetchFeeds(feeds);
  };

  const renderPage = () => {
    if (modal)              return el(ContentModal,  {key:modal.id, ev:modal, tmdbKey, onClose:() => setModal(null)});
    if (page === 'settings') return el(SettingsPage,  {feeds, setFeeds, serverName, setServerName, serverSubtext, setServerSubtext, serverLogo, setServerLogo, refreshInterval, setRefreshInterval, tmdbKey, setTmdbKey, themeMode, setThemeMode, onSave:saveAndSync});
    return el(CalendarPage, {feeds, allEvents, onRefresh:() => fetchFeeds(feeds), loading, onEventClick:setModal});
  };

  return el('div', {id:'app'},
    el('div', {className:'header'},
      el('div', {className:'logo'},
        serverLogo && el('img', {className:'logo-img', src:serverLogo, alt:''}),
        el('div', {className:'logo-text'},
          el('span', {className:'logo-name'}, serverName || '*arr Calendar'),
          serverSubtext && el('span', {className:'logo-sub'}, serverSubtext),
        ),
      ),
      el('div', {className:'nav'},
        el('button', {className:`nav-btn${page === 'calendar' && !modal ? ' active' : ''}`, onClick:() => { setPage('calendar'); setModal(null); }}, 'Calendar'),
        el('button', {className:`nav-btn${page === 'settings'            ? ' active' : ''}`, onClick:() => { setPage('settings'); setModal(null); }}, 'Settings'),
      ),
      el('button', {className:'sync-btn', onClick:() => fetchFeeds(feeds)}, loading ? '…' : '↻ sync'),
    ),
    renderPage(),
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
